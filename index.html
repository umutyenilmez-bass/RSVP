<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSVP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0e14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Davetiye">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #c9d1d9; font-family: 'DM Sans','Segoe UI',sans-serif; min-height: 100vh; }
input, textarea, button, select { font-family: inherit; }

/* ── LAYOUT ── */
#app { display: flex; min-height: 100vh; }
#sidebar {
  width: 210px; background: #0a0e14; border-right: 1px solid #1e2530;
  display: flex; flex-direction: column; padding: 24px 0;
  position: fixed; top: 0; left: 0; height: 100vh; z-index: 10;
}
.logo { display: flex; align-items: center; gap: 10px; padding: 0 20px 24px; border-bottom: 1px solid #1e2530; }
.logo-icon { font-size: 22px; color: #c0a060; }
.logo-text  { font-size: 16px; font-weight: 700; color: #e8d5a3; letter-spacing: 1px; }
nav { display: flex; flex-direction: column; gap: 4px; padding: 16px 12px; }
.nav-btn {
  display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px;
  border: none; background: transparent; color: #6a7a8a; cursor: pointer;
  font-size: 14px; text-align: left; width: 100%; transition: background 0.15s;
}
.nav-btn:hover  { background: #141c28; color: #9aaabb; }
.nav-btn.active { background: #1a2232; color: #c0d0e0; }
.sb-stats { margin-top: auto; padding: 16px; border-top: 1px solid #1e2530; display: flex; flex-direction: column; gap: 6px; }
.sb-pill  { font-size: 12px; color: #5a6a7a; display: flex; align-items: center; gap: 6px; }

#content { flex: 1; margin-left: 210px; padding: 32px 40px; overflow-y: auto; }
.panel { max-width: 700px; }
.panel-title { font-size: 22px; font-weight: 700; color: #e8d5a3; margin-bottom: 4px; }
.panel-sub   { font-size: 13px; color: #5a6a7a; margin-bottom: 28px; }

/* ── FORM ── */
.fg   { display: flex; flex-direction: column; gap: 6px; margin-bottom: 24px; }
.lbl  { font-size: 12px; color: #6a7a8a; text-transform: uppercase; letter-spacing: .5px; margin-top: 10px; display: block; }
.lbl-s { text-transform: none; color: #3a4a5a; letter-spacing: 0; font-size: 11px; }
.inp  {
  background: #111820; border: 1px solid #1e2a38; border-radius: 8px;
  color: #c9d1d9; font-size: 14px; padding: 10px 14px; outline: none; width: 100%;
}
.inp:focus { border-color: #2a3a50; }
select.inp option { background: #111820; }

/* ── CALENDAR ── */
.cal-wrap { position: relative; }
.cal-btn  {
  width: 100%; background: #111820; border: 1px solid #1e2a38; border-radius: 8px;
  color: #c9d1d9; font-size: 14px; padding: 10px 14px; text-align: left;
  cursor: pointer; display: flex; align-items: center; gap: 8px;
}
.cal-btn-lbl { flex: 1; }
.cal-pop {
  position: absolute; top: calc(100% + 6px); left: 0; z-index: 400;
  background: #111820; border: 1px solid #2a3a50; border-radius: 14px;
  padding: 18px; width: 296px; box-shadow: 0 12px 40px rgba(0,0,0,.7);
  display: none;
}
.cal-pop.open { display: block; }
.cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-nav  { background: none; border: none; color: #c0a060; font-size: 22px; cursor: pointer; padding: 0 6px; line-height: 1; }
.cal-mlbl { font-size: 15px; font-weight: 700; color: #e8d5a3; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-dn   { font-size: 10px; color: #4a5a6a; text-align: center; padding: 3px 0; }
.cal-d    { font-size: 13px; text-align: center; padding: 8px 0; border-radius: 6px; border: none; background: none; color: #8a9aaa; cursor: pointer; width: 100%; }
.cal-d:hover:not(:disabled) { background: #1a2a3a; color: #c9d1d9; }
.cal-d.today { color: #c0a060; font-weight: 700; }
.cal-d.pick  { background: #c0a060 !important; color: #0a0e14 !important; font-weight: 700; }
.cal-d:disabled { opacity: .25; cursor: default; }
.time-sec  { margin-top: 14px; padding-top: 14px; border-top: 1px solid #1e2a38; }
.time-lbl  { font-size: 11px; color: #6a7a8a; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; display: block; }
.time-row  { display: flex; align-items: center; gap: 8px; }
.time-row select { flex: 1; padding: 8px 10px; }
.time-sep  { color: #4a5a6a; font-weight: 700; font-size: 18px; flex-shrink: 0; }
.btn-ok    { margin-top: 12px; width: 100%; background: #c0a060; color: #0a0e14; border: none; border-radius: 8px; padding: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }

/* ── LOCATION ── */
.loc-tabs { display: flex; gap: 6px; margin-bottom: 8px; }
.loc-tab  { padding: 6px 14px; border-radius: 6px; border: 1px solid #1e2a38; background: transparent; color: #6a7a8a; cursor: pointer; font-size: 12px; }
.loc-tab.active { background: #1a2232; color: #c0d0e0; border-color: #2a3a50; }
.loc-sw   { position: relative; }
.loc-drop {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 399;
  background: #111820; border: 1px solid #2a3a50; border-radius: 10px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5); max-height: 200px; overflow-y: auto;
  display: none;
}
.loc-drop.open { display: block; }
.loc-row  { padding: 10px 14px; cursor: pointer; font-size: 13px; color: #6a7a8a; border-bottom: 1px solid #1a2230; }
.loc-row:last-child { border-bottom: none; }
.loc-row:hover { background: #1a2a3a; }
.loc-row strong { color: #c9d1d9; display: block; font-size: 14px; margin-bottom: 2px; }
.loc-info { padding: 10px 14px; font-size: 13px; color: #4a5a6a; }
.map-box  { margin-top: 8px; border-radius: 8px; overflow: hidden; border: 1px solid #1e2a38; height: 150px; }
.map-box iframe { width: 100%; height: 100%; border: none; display: block; }
.map-lbl  { font-size: 12px; color: #4a5a6a; margin-top: 4px; }

/* ── BUTTONS ── */
.btn-pri { background: #c0a060; color: #0a0e14; border: none; border-radius: 8px; padding: 12px 24px; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn-pri:hover { opacity: .88; }

/* ── TABS ── */
.tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.tab  { padding: 8px 16px; border-radius: 6px; border: 1px solid #1e2a38; background: transparent; color: #6a7a8a; cursor: pointer; font-size: 13px; }
.tab.active { background: #1a2232; color: #c0d0e0; border-color: #2a3a50; }

/* ── ADD ROW ── */
.add-row { display: flex; gap: 8px; margin-bottom: 20px; }
.add-row .inp { flex: 1; }
.btn-add { background: #c0a060; color: #0a0e14; border: none; border-radius: 8px; width: 44px; font-size: 24px; cursor: pointer; flex-shrink: 0; line-height: 1; }

/* ── GUEST LIST ── */
.g-list  { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
.empty   { color: #3a4a5a; font-size: 14px; text-align: center; padding: 32px; }
.g-card  { background: #111820; border: 1px solid #1e2a38; border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.g-info  { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
.av      { width: 36px; height: 36px; border-radius: 50%; background: #1a2a3a; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #c0a060; flex-shrink: 0; }
.av.sm   { width: 28px; height: 28px; font-size: 12px; }
.g-name  { font-size: 14px; color: #c9d1d9; font-weight: 600; }
.g-phone { font-size: 12px; color: #4a5a6a; }
.badge   { font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 600; flex-shrink: 0; }
.b-yes   { background: #1a3a2a; color: #7ec8a0; }
.b-no    { background: #3a1a1a; color: #e07070; }
.b-maybe { background: #1a2030; color: #c0a060; }
.g-acts  { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
.btn-wa  { background: #1a2d1a; color: #7ec8a0; border: 1px solid #2a4a2a; border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
.btn-cp  { background: #1a2232; color: #8899bb; border: 1px solid #2a3a50; border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer; }
.btn-rm  { background: transparent; color: #3a4a5a; border: none; padding: 6px 8px; cursor: pointer; font-size: 16px; line-height: 1; }
.btn-rm:hover { color: #e07070; }

/* ── STATS ── */
.s-grid  { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
.s-card  { background: #111820; border: 1px solid; border-radius: 10px; padding: 16px; text-align: center; }
.s-num   { font-size: 28px; font-weight: 800; color: #e8d5a3; }
.s-lbl   { font-size: 11px; color: #4a5a6a; margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }
.prog-w  { margin-bottom: 28px; }
.prog-b  { height: 6px; background: #1a2232; border-radius: 3px; display: flex; overflow: hidden; }
.prog-f  { height: 100%; transition: width .5s; }
.prog-l  { display: flex; justify-content: space-between; margin-top: 6px; font-size: 12px; }
.sect    { margin-bottom: 24px; }
.sect-t  { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
.d-list  { display: flex; flex-direction: column; gap: 6px; }
.d-row   { background: #111820; border: 1px solid #1e2a38; border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; gap: 12px; }
.d-name  { flex: 1; font-size: 14px; color: #c9d1d9; }
.d-ph    { font-size: 12px; color: #4a5a6a; }

/* ── RSVP ── */
#rsvp-pg { min-height: 100vh; background: #0a0e14; display: flex; align-items: center; justify-content: center; padding: 24px; }
.r-card  { background: #111820; border: 1px solid #1e2a38; border-radius: 16px; padding: 40px 36px; max-width: 440px; width: 100%; }
.r-lbl   { font-size: 11px; color: #c0a060; text-transform: uppercase; letter-spacing: 1px; }
.r-name  { font-size: 26px; font-weight: 800; color: #e8d5a3; margin: 6px 0 4px; }
.r-gname { font-size: 15px; color: #6a8a9a; }
.r-dets  { display: flex; flex-direction: column; gap: 10px; margin: 20px 0 24px; }
.r-det   { display: flex; gap: 12px; align-items: flex-start; font-size: 14px; color: #8a9aaa; }
.r-ico   { flex-shrink: 0; font-size: 16px; }
.r-mlink { display: inline-block; margin-bottom: 20px; font-size: 13px; color: #c0a060; text-decoration: none; }
.r-mlink:hover { text-decoration: underline; }
.r-q     { font-size: 16px; color: #c9d1d9; font-weight: 600; margin-bottom: 16px; }
.r-btns  { display: flex; gap: 12px; }
.r-btn   { flex: 1; padding: 14px; border-radius: 10px; border: none; font-size: 15px; font-weight: 700; cursor: pointer; }
.r-yes   { background: #7ec8a0; color: #0a1a0a; }
.r-no    { background: #1a2232; color: #6a7a8a; border: 1px solid #2a3a50; }
.r-chk   { font-size: 48px; text-align: center; margin-bottom: 16px; }
.r-tt    { font-size: 22px; font-weight: 800; color: #e8d5a3; text-align: center; margin-bottom: 8px; }
.r-ts    { font-size: 14px; color: #6a7a8a; text-align: center; }

.hidden { display: none !important; }

@media (max-width: 640px) {
  #sidebar { display: none; }
  #content { margin-left: 0; padding: 16px; padding-bottom: 80px; }
  .s-grid  { grid-template-columns: repeat(2,1fr); }
  .cal-pop { width: calc(100vw - 32px); }
}
#mobile-nav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 500;
  background: #0a0e14; border-top: 1px solid #1e2530;
  flex-direction: row;
}
#mobile-nav button {
  flex: 1; padding: 14px 0 10px; border: none; background: transparent;
  color: #6a7a8a; font-size: 11px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
#mobile-nav button.active { color: #c0a060; }
#mobile-nav button span.mn-icon { font-size: 20px; }
@media (max-width: 640px) {
  #mobile-nav { display: flex; }
}
#f-msg { font-size: 16px !important; }
</style>
</head>
<body>

<!-- ── MAIN APP ── -->
<div id="main-app">
  <div id="app">

    <div id="sidebar">
      <div class="logo"><span class="logo-icon">◈</span><span class="logo-text">Davetiye</span></div>
      <nav>
        <button class="nav-btn active" data-v="setup">⚙ Etkinlik</button>
        <button class="nav-btn" data-v="guests">◎ Davetliler</button>
        <button class="nav-btn" data-v="dashboard">▦ Takip</button>
      </nav>
      <div class="sb-stats">
        <div class="sb-pill"><span style="color:#7ec8a0">●</span> <span id="sb-yes">0</span> Geliyor</div>
        <div class="sb-pill"><span style="color:#e07070">●</span> <span id="sb-no">0</span> Gelmiyor</div>
        <div class="sb-pill"><span style="color:#8899aa">●</span> <span id="sb-pending">0</span> Bekliyor</div>
      </div>
    </div>

    <!-- MOBILE NAV -->
    <div id="mobile-nav">
      <button data-v="setup" onclick="showView('setup')">
        <span class="mn-icon">⚙</span>
        <span>Etkinlik</span>
      </button>
      <button data-v="guests" onclick="showView('guests')">
        <span class="mn-icon">◎</span>
        <span>Davetliler</span>
      </button>
      <button data-v="dashboard" onclick="showView('dashboard')">
        <span class="mn-icon">▦</span>
        <span>Takip</span>
      </button>
    </div>

    <div id="content">

      <!-- ── SETUP ── -->
      <div id="v-setup" class="panel">
        <h2 class="panel-title">Etkinlik Detayları</h2>
        <p class="panel-sub">Bu bilgiler davet mesajında ve RSVP sayfasında görünecek.</p>
        <div class="fg">

          <label class="lbl">Etkinlik Adı</label>
          <input class="inp" id="f-name" placeholder="Akustik Gece">

          <label class="lbl">Tarih &amp; Saat</label>
          <div class="cal-wrap" id="cal-wrap">
            <button class="cal-btn" type="button" id="cal-btn">
              <span>📅</span>
              <span class="cal-btn-lbl" id="cal-lbl">Tarih ve saat seç…</span>
            </button>
            <div class="cal-pop" id="cal-pop">
              <div class="cal-head">
                <button class="cal-nav" type="button" id="cal-prev">‹</button>
                <span class="cal-mlbl" id="cal-mlbl"></span>
                <button class="cal-nav" type="button" id="cal-next">›</button>
              </div>
              <div class="cal-grid" id="cal-grid"></div>
              <div class="time-sec">
                <span class="time-lbl">Saat seç</span>
                <div class="time-row">
                  <select class="inp" id="t-h"></select>
                  <span class="time-sep">:</span>
                  <select class="inp" id="t-m"></select>
                </div>
                <button class="btn-ok" type="button" id="cal-ok">✓ Tarih &amp; Saati Onayla</button>
              </div>
            </div>
          </div>

          <label class="lbl">Yer / Adres</label>
          <div class="loc-tabs">
            <button class="loc-tab active" type="button" id="lt-search" onclick="switchLoc('search')">🔍 Ara</button>
            <button class="loc-tab" type="button" id="lt-manual" onclick="switchLoc('manual')">✏️ Manuel Gir</button>
          </div>

          <div id="loc-search-box">
            <div class="loc-sw">
              <input class="inp" id="loc-q" placeholder="Mekan veya adres ara…" autocomplete="off">
              <div class="loc-drop" id="loc-drop"></div>
            </div>
          </div>

          <div id="loc-manual-box" class="hidden">
            <input class="inp" id="loc-addr" placeholder="Tam adres: Fatih Sultan Mehmet Cd. No:16, Bodrum/Muğla" style="margin-bottom:8px">
            <input class="inp" id="loc-glink" placeholder="Google Maps linki (isteğe bağlı)">
          </div>

          <div id="map-box" class="hidden">
            <div class="map-box"><iframe id="map-frame" src="" loading="lazy"></iframe></div>
            <p class="map-lbl" id="map-lbl"></p>
          </div>

          <label class="lbl">Program / Notlar</label>
          <textarea class="inp" id="f-prog" rows="4" placeholder="20:00 Açılış&#10;21:00 Yemek&#10;22:00 Müzik"></textarea>

          <label class="lbl">Mesaj Şablonu <span class="lbl-s">— {isim} {etkinlik} {tarih} {yer} {notlar} {link}</span></label>
          <textarea class="inp" id="f-msg" rows="8" style="font-family:monospace;font-size:12px"></textarea>
        </div>
        <button class="btn-pri" id="btn-save-event">Kaydet ve Davetlilere Geç →</button>
      </div>

      <!-- ── GUESTS ── -->
      <div id="v-guests" class="panel hidden">
        <h2 class="panel-title">Davetliler</h2>
        <p class="panel-sub" id="g-sub">0 kişi eklendi</p>
        <div class="tabs">
          <button class="tab active" id="tab-tek" onclick="switchTab('tek')">Tek Ekle</button>
          <button class="tab" id="tab-top" onclick="switchTab('toplu')">Toplu Ekle</button>
        </div>
        <div id="box-tek">
          <div class="add-row">
            <input class="inp" id="g-ad" placeholder="Ad Soyad">
            <input class="inp" id="g-tel" placeholder="905xxxxxxxxx">
            <button class="btn-add" id="btn-add-g">+</button>
          </div>
        </div>
        <div id="box-top" class="hidden">
          <textarea class="inp" id="g-bulk" rows="5" style="font-family:monospace;font-size:12px;margin-bottom:10px"
            placeholder="Ahmet Yılmaz, 905551234567&#10;Ayşe Kaya, 905559876543"></textarea>
          <button class="btn-pri" id="btn-bulk" style="margin-bottom:16px">Listeyi Ekle</button>
        </div>
        <div class="g-list" id="g-list"></div>
        <div id="dash-goto" class="hidden" style="margin-top:24px">
          <button class="btn-pri" onclick="showView('dashboard')">Takip Panosuna Git →</button>
        </div>
      </div>

      <!-- ── DASHBOARD ── -->
      <div id="v-dashboard" class="panel hidden">
        <h2 class="panel-title">Katılım Takibi</h2>
        <p class="panel-sub" id="d-evname">—</p>
        <div class="s-grid">
          <div class="s-card" style="border-color:#3a4a5a"><div class="s-num" id="d-tot">0</div><div class="s-lbl">Toplam</div></div>
          <div class="s-card" style="border-color:#2a5a3a"><div class="s-num" style="color:#7ec8a0" id="d-yes">0</div><div class="s-lbl">Geliyor</div></div>
          <div class="s-card" style="border-color:#5a2a2a"><div class="s-num" style="color:#e07070" id="d-no">0</div><div class="s-lbl">Gelmiyor</div></div>
          <div class="s-card" style="border-color:#3a3a4a"><div class="s-num" style="color:#8899bb" id="d-pend">0</div><div class="s-lbl">Bekliyor</div></div>
        </div>
        <div class="prog-w" id="prog-w" style="display:none">
          <div class="prog-b">
            <div class="prog-f" id="p-yes" style="background:#7ec8a0"></div>
            <div class="prog-f" id="p-no"  style="background:#e07070"></div>
          </div>
          <div class="prog-l">
            <span style="color:#7ec8a0" id="pct-yes"></span>
            <span style="color:#8899aa" id="pct-pend"></span>
          </div>
        </div>
        <div id="d-sects"></div>
      </div>

    </div>
  </div>
</div>

<!-- ── RSVP PAGE ── -->
<div id="rsvp-pg" class="hidden">
  <div class="r-card" id="r-card"></div>
</div>

<script>
// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
const APP_VERSION = 'v5';
if (localStorage.getItem('app_version') !== APP_VERSION) {
  localStorage.removeItem('ev');
  localStorage.setItem('app_version', APP_VERSION);
}
let guests = JSON.parse(localStorage.getItem('gl') || '[]');
let ev     = JSON.parse(localStorage.getItem('ev') || '{}');

function saveG() { localStorage.setItem('gl', JSON.stringify(guests)); }
function saveE() { localStorage.setItem('ev', JSON.stringify(ev)); }

// ════════════════════════════════════════════════════════
// ROUTING — hash-based RSVP
// ════════════════════════════════════════════════════════
function checkHash() {
  if (window.location.hash.startsWith('#rsvp-')) {
    const id = window.location.hash.slice(6);
    document.getElementById('main-app').classList.add('hidden');
    document.getElementById('rsvp-pg').classList.remove('hidden');
    renderRSVP(id);
  }
}
window.addEventListener('hashchange', checkHash);

// ════════════════════════════════════════════════════════
// VIEWS

function showView(name) {
  ['setup','guests','dashboard'].forEach(v =>
    document.getElementById('v-'+v).classList.add('hidden'));
  document.getElementById('v-'+name).classList.remove('hidden');
  document.querySelectorAll('.nav-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.v === name));
  document.querySelectorAll('#mobile-nav button').forEach(b =>
    b.classList.toggle('active', b.dataset.v === name));
  if (name === 'guests')    renderGuests();
  if (name === 'dashboard') renderDash();
}

document.querySelectorAll('.nav-btn').forEach(b =>
  b.addEventListener('click', () => showView(b.dataset.v)));

// CALENDAR
// ════════════════════════════════════════════════════════
const MO = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const WD = ['Pt','Sa','Ça','Pe','Cu','Ct','Pz'];
let calY = null, calM = null, calSelY = null, calSelM = null, calSelD = null;

function initCal() {
  const now = new Date();
  calY = now.getFullYear(); calM = now.getMonth();

  document.getElementById('cal-btn').addEventListener('click', e => {
    e.stopPropagation();
    const pop = document.getElementById('cal-pop');
    const opening = !pop.classList.contains('open');
    pop.classList.toggle('open');
    if (opening) buildCal();
  });

  document.getElementById('cal-prev').addEventListener('click', e => {
    e.stopPropagation();
    calM--; if (calM < 0) { calM = 11; calY--; }
    buildCal();
  });

  document.getElementById('cal-next').addEventListener('click', e => {
    e.stopPropagation();
    calM++; if (calM > 11) { calM = 0; calY++; }
    buildCal();
  });

  document.getElementById('cal-ok').addEventListener('click', e => {
    e.stopPropagation();
    if (calSelD === null) { alert('Lütfen önce bir gün seçin.'); return; }
    const h  = parseInt(document.getElementById('t-h').value);
    const mn = parseInt(document.getElementById('t-m').value);
    const lbl = `${calSelD} ${MO[calSelM]} ${calSelY}, ${pad(h)}:${pad(mn)}`;
    document.getElementById('cal-lbl').textContent = lbl;
    document.getElementById('cal-pop').classList.remove('open');
  });

  document.addEventListener('click', e => {
    const wrap = document.getElementById('cal-wrap');
    if (!wrap.contains(e.target)) {
      document.getElementById('cal-pop').classList.remove('open');
    }
  });

  // Time selects
  const th = document.getElementById('t-h');
  const tm = document.getElementById('t-m');
  for (let h = 0; h < 24; h++) th.innerHTML += `<option value="${h}">${pad(h)}</option>`;
  [0,15,30,45].forEach(mn => tm.innerHTML += `<option value="${mn}">${pad(mn)}</option>`);
  th.value = 19; tm.value = 0;

  buildCal();
}

function buildCal() {
  document.getElementById('cal-mlbl').textContent = MO[calM] + ' ' + calY;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = WD.map(d => `<div class="cal-dn">${d}</div>`).join('');

  const first = new Date(calY, calM, 1).getDay();
  const off   = first === 0 ? 6 : first - 1;
  const dim   = new Date(calY, calM + 1, 0).getDate();
  const now   = new Date();
  const todayMid = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  for (let i = 0; i < off; i++) grid.innerHTML += `<button class="cal-d" disabled></button>`;

  for (let d = 1; d <= dim; d++) {
    const dt     = new Date(calY, calM, d);
    const past   = dt < todayMid;
    const today  = d === now.getDate() && calM === now.getMonth() && calY === now.getFullYear();
    const picked = d === calSelD && calM === calSelM && calY === calSelY;
    const cls    = ['cal-d', today ? 'today' : '', picked ? 'pick' : ''].filter(Boolean).join(' ');
    grid.innerHTML += `<button class="${cls}" ${past?'disabled':''} data-d="${d}">${d}</button>`;
  }

  grid.querySelectorAll('.cal-d[data-d]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      calSelD = parseInt(btn.dataset.d);
      calSelM = calM; calSelY = calY;
      buildCal();
    });
  });
}

// LOCATION
// ════════════════════════════════════════════════════════
let locMode = 'search';
let locTimer = null;

function switchLoc(mode) {
  locMode = mode;
  document.getElementById('lt-search').classList.toggle('active', mode === 'search');
  document.getElementById('lt-manual').classList.toggle('active', mode === 'manual');
  document.getElementById('loc-search-box').classList.toggle('hidden', mode !== 'search');
  document.getElementById('loc-manual-box').classList.toggle('hidden', mode !== 'manual');
}

function initLocSearch() {
  const inp  = document.getElementById('loc-q');
  const drop = document.getElementById('loc-drop');

  inp.addEventListener('input', () => {
    const q = inp.value.trim();
    if (!q || q.length < 3) { drop.classList.remove('open'); return; }
    clearTimeout(locTimer);
    locTimer = setTimeout(async () => {
      drop.innerHTML = '<div class="loc-info">Aranıyor…</div>';
      drop.classList.add('open');
      try {
        const r = await fetch(
          `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=6&countrycodes=tr&addressdetails=1`,
          { headers: { 'Accept-Language': 'tr', 'User-Agent': 'davetiye/1.0' } }
        );
        const data = await r.json();
        window._ld = data;
        if (!data.length) {
          drop.innerHTML = '<div class="loc-info">Sonuç bulunamadı — Manuel Gir sekmesini dene</div>';
          return;
        }
        drop.innerHTML = data.map((item, i) => {
          const parts = item.display_name.split(',');
          const title = item.name || parts[0];
          const sub   = parts.slice(1,4).join(',').trim();
          return `<div class="loc-row" data-i="${i}"><strong>${x(title)}</strong>${x(sub)}</div>`;
        }).join('');
        drop.querySelectorAll('.loc-row').forEach(row => {
          row.addEventListener('click', () => pickLoc(parseInt(row.dataset.i)));
        });
      } catch(e) {
        drop.innerHTML = '<div class="loc-info">Bağlantı hatası — Manuel Gir sekmesini dene</div>';
      }
    }, 450);
  });

  document.addEventListener('click', e => {
    if (!document.getElementById('loc-search-box').contains(e.target))
      drop.classList.remove('open');
  });
}

function pickLoc(i) {
  const item = window._ld[i];
  const lat  = parseFloat(item.lat);
  const lon  = parseFloat(item.lon);
  document.getElementById('loc-q').value = item.display_name;
  document.getElementById('loc-drop').classList.remove('open');
  window._locPicked = { name: item.display_name, lat, lon,
    mapsUrl: `https://www.google.com/maps?q=${lat},${lon}` };
  showMap(lat, lon, item.display_name);
}

function showMap(lat, lon, label) {
  document.getElementById('map-box').classList.remove('hidden');
  document.getElementById('map-frame').src =
    `https://www.openstreetmap.org/export/embed.html?bbox=${lon-.015},${lat-.015},${lon+.015},${lat+.015}&layer=mapnik&marker=${lat},${lon}`;
  document.getElementById('map-lbl').textContent = '📍 ' + label.split(',').slice(0,2).join(',');
}

function saveEvent() {
  const dateVal = document.getElementById('cal-lbl').textContent;
  const isManual = locMode === 'manual';
  const location = isManual
    ? document.getElementById('loc-addr').value.trim()
    : (window._locPicked ? window._locPicked.name : document.getElementById('loc-q').value.trim());
  const mapsUrl = isManual
    ? document.getElementById('loc-glink').value.trim()
    : (window._locPicked ? window._locPicked.mapsUrl : '');

  ev = {
    name:    document.getElementById('f-name').value.trim(),
    date:    dateVal === 'Tarih ve saat seç…' ? '' : dateVal,
    location, mapsUrl, locMode: isManual ? 'manual' : 'search',
    lat:  window._locPicked ? window._locPicked.lat : '',
    lon:  window._locPicked ? window._locPicked.lon : '',
    prog: document.getElementById('f-prog').value,
    msg:  document.getElementById('f-msg').value.trim(),
  };
  saveE();
  showView('guests');
}

function loadEventForm() {
  if (ev.name) document.getElementById('f-name').value = ev.name;
  if (ev.date) document.getElementById('cal-lbl').textContent = ev.date;
  if (ev.prog) document.getElementById('f-prog').value = ev.prog;
  const defaultMsg = "Selam {isim},\n{etkinlik} adında bir etkinlik düzenliyorum. Uygunsan gelmene sevinirim.\nTarih: {tarih}\nYer: {yer}\nProgram: {notlar}\nAşağıdaki linkten cevabını bırakırsan sevinirim:\n{link}\nGörüşürüz.";
  document.getElementById('f-msg').value = (ev.msg && ev.msg.trim()) ? ev.msg : defaultMsg;

  if (ev.locMode === 'manual') {
    switchLoc('manual');
    if (ev.location) document.getElementById('loc-addr').value  = ev.location;
    if (ev.mapsUrl)  document.getElementById('loc-glink').value = ev.mapsUrl;
  } else {
    if (ev.location) {
      document.getElementById('loc-q').value = ev.location;
      if (ev.lat && ev.lon) {
        window._locPicked = { name: ev.location, lat: ev.lat, lon: ev.lon, mapsUrl: ev.mapsUrl };
        showMap(ev.lat, ev.lon, ev.location);
      }
    }
  }
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function addGuest() {
  const name  = document.getElementById('g-ad').value.trim();
  const phone = document.getElementById('g-tel').value.trim();
  if (!name || !phone) return;
  guests.push({ id: uid(), name, phone, rsvp: null });
  saveG();
  document.getElementById('g-ad').value  = '';
  document.getElementById('g-tel').value = '';
  document.getElementById('g-ad').focus();
  renderGuests(); updateSb();
}

function addBulk() {
  const lines = document.getElementById('g-bulk').value.trim().split('\n').filter(Boolean);
  lines.forEach(line => {
    const p = line.split(/[\t,;|]+/).map(s => s.trim());
    guests.push({ id: uid(), name: p[0] || 'İsimsiz', phone: p[1] || '', rsvp: null });
  });
  saveG();
  document.getElementById('g-bulk').value = '';
  renderGuests(); updateSb();
}

function removeGuest(id) {
  guests = guests.filter(g => g.id !== id);
  saveG(); renderGuests(); updateSb();
}

function rsvpLink(g) {
  const base = window.location.origin + window.location.pathname.replace(/index\.html$/, '');
  return base + '#rsvp-' + g.id;
}

function buildMsg(g) {
  if (!ev.msg) {
    const lines = ["Merhaba " + g.name + "! Seni " + (ev.name || "etkinliğimize") + " etkinliğine davet ediyoruz."];
    if (ev.date)     lines.push("Tarih \u0026 Saat: " + ev.date);
    if (ev.location) lines.push("Yer: " + ev.location);
    if (ev.prog)     lines.push("\nProgram:\n" + ev.prog);
    lines.push("\nKatılım için: " + rsvpLink(g));
    return lines.join("\n");
  }
  let msg = ev.msg;
  // Remove lines with empty values
  if (!ev.date)     msg = msg.replace(/Tarih: \{tarih\}\n?/g, '');
  if (!ev.location) msg = msg.replace(/Yer: \{yer\}\n?/g, '');
  if (!ev.prog || !ev.prog.trim()) msg = msg.replace(/Program: \{notlar\}\n?/g, '');
  return msg
    .replace(/{isim}/g,     g.name)
    .replace(/{etkinlik}/g, ev.name || '')
    .replace(/{tarih}/g,    ev.date || '')
    .replace(/{yer}/g,      ev.location || '')
    .replace(/{notlar}/g,   ev.prog || '')
    .replace(/{link}/g,     rsvpLink(g))
    .replace(/\n{3,}/g,    '\n\n');
}


function openWA(id) {
  const g = guests.find(g => g.id === id); if (!g) return;
  window.open('https://wa.me/' + g.phone.replace(/\D/g,'') + '?text=' + encodeURIComponent(buildMsg(g)), '_blank');
}

function copyMsg(id) {
  const g = guests.find(g => g.id === id); if (!g) return;
  navigator.clipboard.writeText(buildMsg(g));
  const btn = document.getElementById('cp-'+id);
  if (btn) { btn.textContent = '✓ Kopyalandı'; setTimeout(() => btn.textContent = '⎘ Kopyala', 2000); }
}

function renderGuests() {
  const list = document.getElementById('g-list');
  document.getElementById('g-sub').textContent = guests.length + ' kişi eklendi';
  document.getElementById('dash-goto').classList.toggle('hidden', !guests.length);
  if (!guests.length) { list.innerHTML = '<div class="empty">Henüz davetli eklenmedi</div>'; return; }
  list.innerHTML = guests.map(g => {
    const bmap = {yes:'✓ Geliyor',no:'✕ Gelmiyor',maybe:'? Belki'};
    const bcls = {yes:'b-yes',no:'b-no',maybe:'b-maybe'};
    const badge = g.rsvp ? `<span class="badge ${bcls[g.rsvp]||''}">${bmap[g.rsvp]||''}</span>` : '';
    return `<div class="g-card">
      <div class="g-info">
        <div class="av">${g.name[0].toUpperCase()}</div>
        <div><div class="g-name">${x(g.name)}</div><div class="g-phone">${x(g.phone)}</div></div>
        ${badge}
      </div>
      <div class="g-acts">
        <button class="btn-wa" onclick="openWA('${g.id}')">${WA_ICO} WhatsApp</button>
        <button class="btn-cp" id="cp-${g.id}" onclick="copyMsg('${g.id}')">⎘ Kopyala</button>
        <button class="btn-rm" onclick="removeGuest('${g.id}')">✕</button>
      </div>
    </div>`;
  }).join('');
}

// DASHBOARD

function renderDash() {
  const tot  = guests.length;
  const yes  = guests.filter(g => g.rsvp==='yes').length;
  const no   = guests.filter(g => g.rsvp==='no').length;
  const pend = guests.filter(g => !g.rsvp).length;

  document.getElementById('d-evname').textContent = ev.name || 'Etkinlik';
  document.getElementById('d-tot').textContent  = tot;
  document.getElementById('d-yes').textContent  = yes;
  document.getElementById('d-no').textContent   = no;
  document.getElementById('d-pend').textContent = pend;

  const pw = document.getElementById('prog-w');
  if (tot > 0) {
    pw.style.display = 'block';
    document.getElementById('p-yes').style.width  = (yes/tot*100)+'%';
    document.getElementById('p-no').style.width   = (no/tot*100)+'%';
    document.getElementById('pct-yes').textContent  = Math.round(yes/tot*100)+'% geliyor';
    document.getElementById('pct-pend').textContent = Math.round(pend/tot*100)+'% bekleniyor';
  } else pw.style.display = 'none';

  const sec = document.getElementById('d-sects');
  sec.innerHTML = '';
  [
    { f:'yes',   lbl:'Gelenler',          col:'#7ec8a0' },
    { f:'maybe', lbl:'Belki Gelenler',     col:'#c0a060' },
    { f:'no',    lbl:'Gelmeyenler',        col:'#e07070' },
    { f:null,    lbl:'Yanıt Bekleyenler',  col:'#8899bb' },
  ].forEach(({ f, lbl, col }) => {
    const list = guests.filter(g => g.rsvp === f);
    if (!list.length) return;
    sec.innerHTML += `<div class="sect">
      <h3 class="sect-t" style="color:${col}">${lbl} (${list.length})</h3>
      <div class="d-list">${list.map(g=>`
        <div class="d-row">
          <div class="av sm">${g.name[0].toUpperCase()}</div>
          <span class="d-name">${x(g.name)}</span>
          <span class="d-ph">${x(g.phone)}</span>
          ${f===null?`<button class="btn-wa" onclick="openWA('${g.id}')">${WA_ICO} Hatırlat</button>`:''}
        </div>`).join('')}
      </div></div>`;
  });
}

function renderRSVP(gid) {
  const card  = document.getElementById('r-card');
  const guest = guests.find(g => g.id === gid);
  if (!guest) { card.innerHTML = '<p style="color:#c0a080;font-size:14px">Bu davet linki geçerli değil.</p>'; return; }

  const cur = guest.rsvp;
  const hl  = (v) => cur === v ? 'box-shadow:0 0 0 2px #c0a060;font-weight:800;' : 'opacity:0.75;';

  const dateRow = ev.date          ? '<div class="r-det"><span class="r-ico">Tarih:</span><span>' + x(ev.date) + '</span></div>' : '';
  const locRow  = ev.location      ? '<div class="r-det"><span class="r-ico">Yer:</span><span>' + x(ev.location) + '</span></div>' : '';
  const progRow = (ev.prog && ev.prog.trim()) ? '<div class="r-det"><span class="r-ico">Program:</span><span style="white-space:pre-line">' + x(ev.prog) + '</span></div>' : '';
  const mapLink = ev.mapsUrl       ? '<a class="r-mlink" href="' + x(ev.mapsUrl) + '" target="_blank">Google Maps'te gör &rarr;</a>' : '';
  const curTxt  = cur === 'yes' ? 'Geliyorum' : cur === 'maybe' ? 'Belki' : cur === 'no' ? 'Gelemiyorum' : '';

  card.innerHTML =
    '<span class="r-lbl">Davetiye</span>' +
    '<h1 class="r-name">' + x(ev.name || 'Etkinlik') + '</h1>' +
    '<p class="r-gname">Merhaba, ' + x(guest.name) + '</p>' +
    '<div class="r-dets">' + dateRow + locRow + progRow + '</div>' +
    mapLink +
    '<p class="r-q">' + (cur ? 'Cevabini degistirmek istersen:' : 'Katilacak misin?') + '</p>' +
    '<div class="r-btns" style="flex-direction:column;gap:12px">' +
      '<button class="r-btn r-yes" style="' + hl('yes') + '" onclick="respond('' + gid + '','yes')">Geliyorum</button>' +
      '<button class="r-btn" style="background:#1a2232;color:#c0a060;border:1px solid #3a4a60;padding:14px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;width:100%;' + hl('maybe') + '" onclick="respond('' + gid + '','maybe')">Belki</button>' +
      '<button class="r-btn r-no" style="' + hl('no') + '" onclick="respond('' + gid + '','no')">Gelemiyorum</button>' +
    '</div>' +
    (cur ? '<p style="margin-top:14px;font-size:12px;color:#4a5a6a;text-align:center">Mevcut cevabın: <strong style="color:#c0a060">' + curTxt + '</strong></p>' : '');
}

function respond(gid, ans) {
  guests = guests.map(g => g.id===gid ? {...g, rsvp:ans} : g);
  saveG(); updateSb();
  showThank(document.getElementById('r-card'), guests.find(g=>g.id===gid), ans);
}

function showThank(card, guest, ans) {
  const msgs = {
    yes:   { icon: '✓', title: 'Görüşürüz!',           sub: x(guest.name) + ', katılımın kaydedildi.' },
    no:    { icon: '✕', title: 'Anladık, bir dahaki sefere!', sub: x(guest.name) + ', cevabın iletildi.' },
    maybe: { icon: '?', title: 'Tamam, bekleyeceğiz!',  sub: x(guest.name) + ', "belki" olarak kaydedildi.' },
  };
  const m = msgs[ans] || msgs.no;
  card.innerHTML = `<div class="r-chk">${m.icon}</div><h2 class="r-tt">${m.title}</h2><p class="r-ts">${m.sub}</p>`;
}

checkHash();
